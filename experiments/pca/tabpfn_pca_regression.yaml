construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: false

data:
  illness: ["SCZ", "ADHD", "BIP", "OCD", "MDD", "AZ"]
  p_clump: [0.0001]
  distribution: ["low"]
  target: Z
  test_size: 0.2
  n_splits: 5
  save_splits: true
  polars: true
  chunk_size: 10000
  row_ratio: [1]
  col_ratio: [1]
  top_rows: true
  top_cols: true
  mri_p_value: 0.05
  pca: [0.9, 0.95, 0.99, "effective", null]

experiment:
  run: true

model:
  name: tabpfn
  type: ["regression"]
  p_value_binary: 0.0001
  finetune: false
  device: mps
  epochs: 30
  learning_rate: 1e-5

hpo:
  run: true
  outer_cv: 5

evaluation:
  metrics: [r2, mse, pearson_r2]
  binary_threshold: null
