# Experiment: Linear Regression on Schizophrenia (SCZ)
construct_gwas_mri:
  run: false

plink2:
  prepare: false
  
# Data settings
data:
  illness: [SCZ, BIP, AZ, ADHD, OCD, MDD]
  p_clump: [0.0001, 0.001, 0.01, 0.1]
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: true
  polars: true
  distribution: [low, low_high, uniform]
  sampling: false

experiment:
  run: true

# Model settings
model:
  name: xgboost    # Options: linear_regression, dnn, baseline
  n_estimators: 200
  max_depth: 3
  learning_rate: 0.1
  subsample: 0.9
  colsample_bytree: 0.8

# Evaluation settings
evaluation:
  metrics: [r2, mse, stderr]
  binary_threshold: null      # Set to a number (e.g. 0 or 1) to also compute classification metrics
