# Experiment: Linear Regression on Schizophrenia (SCZ)
construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: true
  p_clump: 0.0001
  distribution: low
  polars: true
  chunk_size: 10000
  
# Data settings
data:
  illness: AZ
  p_clump: 0.0001
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: true
  polars: true

experiment:
  run: true
# Data settings

# Model settings
model:
  name: tabpfn    # Options: linear_regression, lasso_regression, ridge_regression, dnn, baseline
  finetune: false
  device: cuda
  epochs: 30
  learning_rate: 1e-5
  
# Evaluation settings
evaluation:
  metrics: [r2, mse]
  binary_threshold: null      # Set to a number (e.g. 0 or 1) to also compute classification metrics
