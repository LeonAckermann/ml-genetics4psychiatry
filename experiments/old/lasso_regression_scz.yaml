# Experiment: Linear Regression on Schizophrenia (SCZ)
construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: true
  p_clump: 0.0001
  distribution: low
  polars: true
  chunk_size: 10000
  
# Data settings
data:
  illness: SCZ
  p_clump: 0.0001
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: true
  polars: true

experiment:
  run: true
# Data settings
data:
  illness: SCZ
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: false

# Model settings
model:
  name: lasso_regression    # Options: linear_regression, lasso_regression, ridge_regression, dnn, baseline
  #best_alpha: 0.02123011124333675       # Only used for lasso_regression, ignored otherwise
  best_alpha: 0.12591974840976478       # Only used for lasso_regression, ignored otherwise
# DNN-specific settings (ignored for linear_regression)
# model:
#   name: dnn
#   hidden_dims: [50, 50]
#   output_dim: 1
#   dropout: 0.5
#   learning_rate: 0.0005
#   epochs: 100
#   batch_size: 32

# Evaluation settings
evaluation:
  metrics: [r2, mse]
  binary_threshold: null      # Set to a number (e.g. 0 or 1) to also compute classification metrics
