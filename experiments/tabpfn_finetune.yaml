# Experiment: Linear Regression on Schizophrenia (SCZ)
construct_gwas_mri:
  run: false

plink2:
  prepare: false
  
# Data settings
data:
  illness: [SCZ, BIP, AZ, ADHD, OCD, MDD]
  p_clump: [0.001]
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: true
  polars: true
  distribution: [low, low_high, uniform]
  sampling: false

experiment:
  run: true

# Model settings
model:
  name: tabpfn    # Options: linear_regression, lasso_regression, ridge_regression, dnn, baseline
  finetune: true
  device: cuda
  epochs: 30
  learning_rate: 1e-5

# Evaluation settings
evaluation:
  metrics: [r2, mse, stderr]
  binary_threshold: null      # Set to a number (e.g. 0 or 1) to also compute classification metrics
