# Experiment: XGBoost with HPO on Schizophrenia (SCZ)
construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: false

# Data settings
data:
  illness: [SCZ, BIP, AZ, ADHD, OCD, MDD]
  p_clump: [0.0001, 0.001, 0.01, 0.1]
  distribution: ["low"]
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: true
  polars: true
  chunk_size: 10000

experiment:
  run: false

# Model settings
model:
  name: lasso_regression    # Options: linear_regression, dnn, baseline
# Hyperparameter optimization settings
hpo:
  run: true
  n_trials: 2
  outer_cv: 5
  inner_cv: 5
  search_space:
    alpha: [0.00001, 100]
# Evaluation settings
evaluation:
  metrics: [r2, mse]
  binary_threshold: null