# Experiment: Linear Regression on Schizophrenia (SCZ)

# Data settings
data:
  illness: SCZ
  target: Z_scores_SCZ
  test_size: 0.2
  n_splits: 10
  save_splits: true

# Model settings
model:
  name: linear_regression    # Options: linear_regression, dnn, baseline

# DNN-specific settings (ignored for linear_regression)
# model:
#   name: dnn
#   hidden_dims: [50, 50]
#   output_dim: 1
#   dropout: 0.5
#   learning_rate: 0.0005
#   epochs: 100
#   batch_size: 32

# Evaluation settings
evaluation:
  metrics: [r2, mse]
  binary_threshold: null      # Set to a number (e.g. 0 or 1) to also compute classification metrics
