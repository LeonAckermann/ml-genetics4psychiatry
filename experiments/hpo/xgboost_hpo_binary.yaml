# Experiment: Residual DNN with Pre-loaded Best Parameters
# This config loads best parameters from the best_params/ folder
# and skips hyperparameter optimization entirely.

construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: false

# Data settings
data:
  illness: ["SCZ", "ADHD", "BIP", "OCD", "MDD", "AZ"]
  p_clump: [0.001, 0.01, 0.1]
  distribution: ["low"]
  target: Z
  test_size: 0.2
  n_splits: 5
  save_splits: true
  polars: true
  chunk_size: 10000
  row_ratio: [0.2, 0.4, 0.6, 0.8, 1]
  col_ratio: [1]
  top_rows: true
  top_cols: true
  mri_p_value: 0.0001

experiment:
  run: false

# Model settings
model:
  name: xgboost
  type: ["binary_classification"]
  p_value_binary: 0.0001

# Skip HPO and load best params from best_params folder
# Hyperparameter optimization settings
hpo:
  run: true
  n_trials: 10
  outer_cv: 5
  inner_cv: 5
  search_space:
    n_estimators: [30, 100]
    max_depth: [3, 8]
    learning_rate: [0.1, 0.6]
    subsample: [0.5, 1.0]
    colsample_bytree: [0.8, 1.0]
    reg_alpha: [0, 0.1]
    reg_lambda: [0, 0.5]
    min_child_weight: [1, 3]
    gamma: [0, 0.3]
    early_stopping_rounds: [5, 20]


load_best_params: false

# Evaluation settings
evaluation:
  metrics: [accuracy, f1]
  binary_threshold: null
