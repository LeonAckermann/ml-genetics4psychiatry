# Experiment: Lasso Regression with HPO on Schizophrenia (SCZ)
construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: false

# Data settings
data:
  illness: ["SCZ", "ADHD", "BIP", "OCD", "MDD", "AZ"]
  p_clump: [0.0001, 0.001, 0.01]
  distribution: ["low"]
  target: Z
  test_size: 0.2
  n_splits: 5
  save_splits: true
  polars: true
  chunk_size: 10000
  row_ratio: [1]
  col_ratio: [1]
  top_rows: true
  top_cols: true
  mri_p_value: 0.05

experiment:
  run: false

# Model settings
model:
  name: lasso    
  type: ["regression"]  # Options: regression, binary_classification
  p_value_binary: 0.0001
# Hyperparameter optimization settings
hpo:
  run: true
  n_trials: 5
  outer_cv: 5
  inner_cv: 5
  search_space:
    alpha: [0.00001, 10000]
# Evaluation settings
evaluation:
  metrics: [r2, mse, pearson_r2]
  binary_threshold: null