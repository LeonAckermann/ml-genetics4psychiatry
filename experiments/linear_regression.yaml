# Experiment: Linear Regression on Schizophrenia (SCZ)
construct_gwas_mri:
  run: false

plink2:
  prepare: false
  
# Data settings
data:
  illness: [SCZ, BIP, AZ, ADHD, OCD, MDD]
  p_clump: [0.0001, 0.001, 0.01, 0.1]
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: true
  polars: true
  distribution: [low]
  sampling: true
  row_ratio: 0.4
  col_ratio: 0.5
  top_rows: true
  top_cols: true
  mri_p_value: 0.05


experiment:
  run: true

# Model settings
model:
  name: linear_regression    # Options: linear_regression, dnn, baseline

# Evaluation settings
evaluation:
  metrics: [r2, mse]
  binary_threshold: null      # Set to a number (e.g. 0 or 1) to also compute classification metrics
