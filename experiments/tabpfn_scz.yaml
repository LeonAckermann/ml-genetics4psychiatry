# Experiment: Linear Regression on Schizophrenia (SCZ)
construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: false

  
# Data settings
data:
  illness: ["SCZ"]
  p_clump: [0.0001]
  target: Z
  distribution: ["low"]
  test_size: 0.2
  n_splits: 10
  save_splits: true
  polars: true
  sampling: false
  row_ratio: [0.2]
  col_ratio: [0.2]
  top_rows: true
  top_cols: true
  mri_p_value: 0.05

experiment:
  run: false
# Data settings

# Model settings
model:
  name: tabpfn    # Options: linear_regression, lasso_regression, ridge_regression, dnn, baseline, tabpfn
  finetune: false
  device: cuda
  epochs: 30
  learning_rate: 1e-5

hpo:
  run: true
  outer_cv: 5
  
# Evaluation settings
evaluation:
  metrics: [r2, mse, stderr]
  binary_threshold: null      # Set to a number (e.g. 0 or 1) to also compute classification metrics
