# Experiment: Linear Regression on Schizophrenia (SCZ)

construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: true
  p_clump: 0.0001
  distribution: low
  polars: true
  chunk_size: 10000
  
# Data settings
data:
  illness: SCZ
  p_clump: 0.0001
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: true
  polars: true

experiment:
  run: true

# DNN-specific settings (ignored for linear_regression)
model:
  name: residual_dnn
  hidden_dims: [128,128, 64, 64, 32, 32]
  output_dim: 1
  dropout: 0.4
  learning_rate: 0.00001
  epochs: 300
  batch_size: 32

# Evaluation settings
evaluation:
  metrics: [r2, mse]
  binary_threshold: null      # Set to a number (e.g. 0 or 1) to also compute classification metrics
