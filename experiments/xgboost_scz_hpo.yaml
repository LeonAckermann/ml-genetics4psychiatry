# Experiment: XGBoost with HPO on Schizophrenia (SCZ)
construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: false

# Data settings
data:
  illness: ["SCZ"]
  p_clump: [0.0001]
  distribution: ["low"]
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: true
  polars: true
  chunk_size: 10000

experiment:
  run: false

# Model settings
model:
  name: xgboost    # Options: linear_regression, dnn, baseline

# Hyperparameter optimization settings
hpo:
  run: true
  n_trials: 2
  outer_cv: 3
  inner_cv: 2
  search_space:
    n_estimators: [30, 100]
    max_depth: [3, 5]
    learning_rate: [0.1, 0.2]
    subsample: [0.8, 1.0]
    colsample_bytree: [0.8, 1.0]
    reg_alpha: [0, 0.1]
    reg_lambda: [0, 0.5]
    min_child_weight: [1, 3]
    gamma: [0, 0.3]

# Evaluation settings
evaluation:
  metrics: [r2, mse]
  binary_threshold: null