# Experiment: Linear Regression on Schizophrenia (SCZ)

# Data settings
data:
  illness: SCZ
  target: Z_scores_SCZ
  test_size: 0.2
  n_splits: 10
  save_splits: true

# Model settings
model:
  name: xgboost    # Options: linear_regression, dnn, baseline
  n_estimators: 200
  max_depth: 3
  learning_rate: 0.1
  subsample: 0.9
  colsample_bytree: 0.8


# Evaluation settings
evaluation:
  metrics: [r2, mse]
  binary_threshold: null      # Set to a number (e.g. 0 or 1) to also compute classification metrics
