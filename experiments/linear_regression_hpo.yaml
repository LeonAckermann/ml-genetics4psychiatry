# Experiment: Lasso Regression with HPO on Schizophrenia (SCZ)
construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: false

# Data settings
data:
  illness: ["SCZ"]
  p_clump: [0.0001]
  distribution: ["low"]
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: true
  polars: true
  chunk_size: 10000
  row_ratio: [0.1]
  col_ratio: [0.3]
  top_rows: true
  top_cols: true
  mri_p_value: 0.0001

experiment:
  run: false

# Model settings
model:
  name: linear_regression    # Options: linear_regression, dnn, baseline
# Hyperparameter optimization settings
hpo:
  run: true
  outer_cv: 5

# Evaluation settings
evaluation:
  metrics: [r2, mse, pearson_r2]
  binary_threshold: null