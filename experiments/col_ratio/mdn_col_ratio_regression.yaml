construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: false

data:
  illness: ["SCZ", "BIP", "MDD", "OCD", "AZ", "ADHD"]
  p_clump: [0.0001]
  distribution: ["low_high"]
  target: Z
  test_size: 0.2
  n_splits: 5
  save_splits: true
  polars: true
  chunk_size: 10000
  row_ratio: [1]
  col_ratio: [0.2, 0.4, 0.6, 0.8]
  top_rows: true
  top_cols: true
  mri_p_value: 0.0001

experiment:
  run: true

model:
  name: mdn
  type: ["regression"]
  p_value_binary: 0.0001

hpo:
  run: true
  n_trials: 1
  outer_cv: 3
  inner_cv: 3
  search_space:
    hidden_dim: [32, 128]
    n_layers: [1, 4]
    dropout: [0.1, 0.5]
    learning_rate: [0.00001, 0.001]
    weight_decay: [0.0, 0.0001]
    batch_size: [16, 64]
    epochs: [100, 400]
    patience: [10, 30]
    number_of_components: [2, 4]

evaluation:
  metrics: [r2, pearson_r2]
  binary_threshold: null
