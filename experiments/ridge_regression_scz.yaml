# Experiment: Linear Regression on Schizophrenia (SCZ)

construct_gwas_mri:
  run: false

plink2:
  prepare: false

sampling:
  run: true
  p_clump: 0.001
  distribution: low_high
  polars: true
  chunk_size: 10000
  
# Data settings
data:
  illness: SCZ
  p_clump: 0.001
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: true
  polars: true

experiment:
  run: true


# Data settings
data:
  illness: SCZ
  target: Z
  test_size: 0.2
  n_splits: 10
  save_splits: true

# Model settings
model:
  name: ridge_regression    # Options: linear_regression, dnn, baseline
  best_alpha: 1000.0       # Only used for ridge_regression, ignored otherwise  


# Evaluation settings
evaluation:
  metrics: [r2, mse]
  binary_threshold: null      # Set to a number (e.g. 0 or 1) to also compute classification metrics
